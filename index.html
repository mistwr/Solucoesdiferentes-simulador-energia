<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Energia & G\u00e1s \u2014 Solu\u00e7\u00f5es Diferentes</title>
<meta name="description" content="Compare tarifas de eletricidade e g\u00e1s \u2014 Endesa, Repsol, Iberdrola, Galp. Calcule a poupan\u00e7a total em ambas as faturas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0B0F;--bg1:#0E1018;--bg2:#12141F;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.07);
  --accent:#FF6B2B;--accent2:#FFB347;
  --blue:#4F8EF7;--green:#22D37A;
  --og:#FF8C42;--bg-gas:#4FC3F7;
  --combo:#A78BFA;--combo2:#F472B6;
  --text:#F0F2F8;--text2:#8891A8;--text3:#3E4558;
  --r:14px;--r2:20px;--r3:28px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.ambient::before{content:'';position:absolute;top:-20%;left:-10%;width:70vw;height:70vw;max-width:800px;max-height:800px;background:radial-gradient(circle,rgba(255,107,43,.07) 0%,transparent 65%);transition:background .6s;}
.ambient.gas-mode::before{background:radial-gradient(circle,rgba(255,140,66,.09) 0%,transparent 65%);}
.ambient.combo-mode::before{background:radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 65%);}
.ambient::after{content:'';position:absolute;bottom:-20%;right:-10%;width:60vw;height:60vw;max-width:700px;max-height:700px;background:radial-gradient(circle,rgba(79,142,247,.06) 0%,transparent 65%);transition:background .6s;}
.ambient.gas-mode::after{background:radial-gradient(circle,rgba(79,195,247,.08) 0%,transparent 65%);}
.ambient.combo-mode::after{background:radial-gradient(circle,rgba(244,114,182,.07) 0%,transparent 65%);}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:50px 50px;}

.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px 120px;}

/* \u2500\u2500 HEADER \u2500\u2500 */
header{padding:36px 0 28px;text-align:center;}
.brand{display:inline-flex;align-items:center;gap:10px;background:var(--glass2);border:1px solid var(--border);border-radius:50px;padding:8px 18px 8px 12px;margin-bottom:24px;}
.brand-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.brand-name{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);}
h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,6vw,3rem);font-weight:800;line-height:1.1;margin-bottom:14px;}
h1 .line1{display:block;color:#fff;}
h1 .line2{display:block;background:linear-gradient(100deg,var(--accent) 0%,var(--accent2) 50%,#FFE09A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:all .4s;}
h1 .line2.gas-grad{background:linear-gradient(100deg,#FF8C42 0%,#FFB347 50%,#4FC3F7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
h1 .line2.combo-grad{background:linear-gradient(100deg,#A78BFA 0%,#F472B6 50%,#FFB347 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-desc{color:var(--text2);font-size:.93rem;line-height:1.65;max-width:560px;margin:0 auto 16px;}
.header-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;}
.tag{background:var(--glass);border:1px solid var(--border);border-radius:50px;padding:4px 12px;font-size:.72rem;color:var(--text2);letter-spacing:.06em;}
.tag.live::before{content:'\u25cf ';color:var(--green);font-size:.55rem;animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* \u2500\u2500 MODE TOGGLE \u2500\u2500 */
.energy-toggle{display:flex;background:var(--bg1);border:1px solid var(--border);border-radius:50px;padding:5px;margin:0 auto 28px;width:fit-content;gap:4px;}
.et-btn{display:flex;align-items:center;gap:7px;padding:11px 22px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s;color:var(--text3);border:none;background:transparent;letter-spacing:.04em;}
.et-btn.active-luz{background:linear-gradient(135deg,rgba(255,107,43,.2),rgba(255,179,71,.1));color:var(--accent);box-shadow:0 0 20px rgba(255,107,43,.15);}
.et-btn.active-gas{background:linear-gradient(135deg,rgba(255,140,66,.2),rgba(79,195,247,.1));color:var(--og);box-shadow:0 0 20px rgba(255,140,66,.15);}
.et-btn.active-combo{background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(244,114,182,.12));color:var(--combo);box-shadow:0 0 20px rgba(167,139,250,.18);}
.et-ico{font-size:.95rem;}
@media(max-width:520px){.et-btn{padding:9px 13px;font-size:.73rem;gap:5px;}}

/* \u2500\u2500 PROGRESS \u2500\u2500 */
.progress-wrap{display:flex;align-items:center;margin-bottom:28px;background:var(--bg1);border:1px solid var(--border);border-radius:50px;padding:6px;gap:0;}
.prog-step{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 4px;border-radius:50px;font-size:.78rem;font-weight:500;color:var(--text3);transition:all .3s;cursor:pointer;}
.prog-step.active{background:linear-gradient(135deg,rgba(255,107,43,.15),rgba(255,179,71,.08));color:var(--accent);}
.prog-step.active.gas{background:linear-gradient(135deg,rgba(255,140,66,.15),rgba(79,195,247,.08));color:var(--og);}
.prog-step.active.combo{background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(244,114,182,.08));color:var(--combo);}
.prog-step.done{color:var(--green);}
.prog-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:800;background:var(--bg2);color:var(--text3);transition:all .3s;flex-shrink:0;}
.prog-step.active .prog-num{background:var(--accent);color:#000;}
.prog-step.active.gas .prog-num{background:var(--og);color:#000;}
.prog-step.active.combo .prog-num{background:var(--combo);color:#000;}
.prog-step.done .prog-num{background:var(--green);color:#000;}
.prog-label{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.04em;}
@media(max-width:500px){.prog-label{display:none;}}

/* \u2500\u2500 STEP CARDS \u2500\u2500 */
.step-card{background:var(--bg1);border:1.5px solid var(--border);border-radius:var(--r3);padding:30px;margin-bottom:14px;transition:all .3s;position:relative;overflow:hidden;}
.step-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,43,.3),transparent);opacity:0;transition:opacity .3s;}
.step-card.active::after{opacity:1;}
.step-card.gas-card.active::after{background:linear-gradient(90deg,transparent,rgba(255,140,66,.35),transparent);}
.step-card.combo-card.active::after{background:linear-gradient(90deg,transparent,rgba(167,139,250,.35),transparent);}
.step-card.locked{opacity:.42;pointer-events:none;}

/* section divider inside combo card */
.sec-divider{
  display:flex;align-items:center;gap:14px;
  margin:28px 0 22px;
}
.sec-divider-line{flex:1;height:1px;background:var(--border);}
.sec-divider-badge{
  display:flex;align-items:center;gap:7px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:50px;padding:5px 14px;
  font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;
  color:var(--text2);letter-spacing:.06em;white-space:nowrap;
}

.step-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.step-num{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.step-num.gas{background:linear-gradient(135deg,var(--og),var(--bg-gas));}
.step-num.combo{background:linear-gradient(135deg,var(--combo),var(--combo2));}
.step-title{font-family:'Syne',sans-serif;font-size:1.02rem;font-weight:700;color:#fff;}
.step-sub{font-size:.78rem;color:var(--text2);margin-top:2px;}

/* \u2500\u2500 GRIDS \u2500\u2500 */
.pot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;}
.pot-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 8px;text-align:center;cursor:pointer;transition:all .2s;user-select:none;}
.pot-btn:hover{border-color:rgba(255,107,43,.4);background:rgba(255,107,43,.04);}
.pot-btn.sel{border-color:var(--accent);background:linear-gradient(135deg,rgba(255,107,43,.14),rgba(255,179,71,.06));box-shadow:0 0 18px rgba(255,107,43,.18);}
.pot-btn.combo-sel{border-color:var(--combo);background:linear-gradient(135deg,rgba(167,139,250,.14),rgba(244,114,182,.06));box-shadow:0 0 18px rgba(167,139,250,.18);}
.pot-kva{font-family:'Syne',sans-serif;font-size:.83rem;font-weight:700;color:var(--text2);display:block;transition:color .2s;}
.pot-btn.sel .pot-kva{color:var(--accent);}
.pot-btn.combo-sel .pot-kva{color:var(--combo);}

.escalao-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:520px){.escalao-grid{grid-template-columns:1fr;}}
.escalao-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:18px 14px;cursor:pointer;transition:all .2s;user-select:none;text-align:center;}
.escalao-btn:hover{border-color:rgba(255,140,66,.4);}
.escalao-btn.sel-gas{border-color:var(--og);background:linear-gradient(135deg,rgba(255,140,66,.12),rgba(79,195,247,.05));box-shadow:0 0 16px rgba(255,140,66,.14);}
.escalao-btn.sel-combo{border-color:var(--combo);background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(244,114,182,.05));box-shadow:0 0 16px rgba(167,139,250,.14);}
.escalao-ico{font-size:1.6rem;margin-bottom:6px;display:block;}
.escalao-name{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;color:#fff;margin-bottom:3px;}
.escalao-btn.sel-gas .escalao-name,.escalao-btn.sel-combo .escalao-name{color:var(--og);}
.escalao-range{font-size:.73rem;color:var(--text2);line-height:1.35;}
.escalao-kwhrange{font-size:.68rem;color:var(--text3);margin-top:2px;}

.ciclo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ciclo-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .2s;user-select:none;}
.ciclo-btn:hover{border-color:rgba(255,107,43,.4);}
.ciclo-btn.sel{border-color:var(--accent);background:linear-gradient(135deg,rgba(255,107,43,.12),rgba(255,179,71,.05));}
.ciclo-btn.combo-sel{border-color:var(--combo);background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(244,114,182,.05));}
.ciclo-ico{font-size:1.5rem;margin-bottom:7px;display:block;}
.ciclo-name{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;color:#fff;margin-bottom:4px;}
.ciclo-btn.sel .ciclo-name{color:var(--accent);}
.ciclo-btn.combo-sel .ciclo-name{color:var(--combo);}
.ciclo-desc{font-size:.74rem;color:var(--text2);line-height:1.4;}

/* \u2500\u2500 INPUTS \u2500\u2500 */
.fields{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.fields.single{grid-template-columns:1fr;}
@media(max-width:500px){.fields{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:.78rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;}
.lbadge{background:rgba(79,142,247,.15);color:var(--blue);border-radius:4px;padding:1px 6px;font-size:.64rem;font-weight:700;}
.lbadge.gas{background:rgba(255,140,66,.15);color:var(--og);}
.lbadge.combo{background:rgba(167,139,250,.15);color:var(--combo);}
.field input{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 15px;font-family:'Outfit',sans-serif;font-size:1rem;color:#fff;outline:none;transition:all .2s;width:100%;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,43,.1);}
.field input.gas:focus{border-color:var(--og);box-shadow:0 0 0 3px rgba(255,140,66,.1);}
.field input.combo:focus{border-color:var(--combo);box-shadow:0 0 0 3px rgba(167,139,250,.1);}
.field input::placeholder{color:var(--text3);}
.field .hint{font-size:.7rem;color:var(--text3);line-height:1.4;}

/* conv box */
.conv-box{background:rgba(79,195,247,.05);border:1px solid rgba(79,195,247,.14);border-radius:var(--r);padding:13px 15px;margin-bottom:16px;display:flex;align-items:flex-start;gap:9px;}
.conv-box p{font-size:.76rem;color:var(--text2);line-height:1.55;}
.conv-box strong{color:#fff;}
.conv-calc{display:inline-flex;align-items:center;gap:5px;background:rgba(79,195,247,.1);border-radius:6px;padding:3px 10px;font-size:.73rem;color:var(--bg-gas);font-weight:600;margin-top:5px;cursor:pointer;border:none;outline:none;}

hr.sep{border:none;border-top:1px solid var(--border);margin:24px 0;}

/* \u2500\u2500 BUTTONS \u2500\u2500 */
.btn-go{width:100%;padding:17px 24px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border:none;border-radius:var(--r2);font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:#000;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 24px rgba(255,107,43,.25);}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(255,107,43,.4);}
.btn-go:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-go.gas-btn{background:linear-gradient(135deg,var(--og) 0%,var(--bg-gas) 100%);box-shadow:0 4px 24px rgba(255,140,66,.22);}
.btn-go.gas-btn:hover{box-shadow:0 8px 36px rgba(255,140,66,.38);}
.btn-go.combo-btn{background:linear-gradient(135deg,var(--combo) 0%,var(--combo2) 100%);box-shadow:0 4px 28px rgba(167,139,250,.3);}
.btn-go.combo-btn:hover{box-shadow:0 8px 40px rgba(167,139,250,.48);}
.btn-go svg{width:20px;height:20px;flex-shrink:0;}
.loading-spinner{display:none;width:20px;height:20px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-go.loading .loading-spinner{display:block;}
.btn-go.loading .btn-text{display:none;}

.error-notice{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);border-radius:var(--r);padding:13px 16px;font-size:.8rem;color:#FF6B6B;display:none;margin-top:12px;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   COMBINED RESULTS BREAKDOWN PANEL
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.combo-breakdown{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-top:10px;
}
.cbd-part{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 16px;
}
.cbd-label{font-size:.7rem;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.cbd-val{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:#fff;}
.cbd-sub{font-size:.68rem;color:var(--text3);margin-top:2px;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   RESULTS
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
#results{display:none;}
#results.show{display:block;animation:fadeUp .5s cubic-bezier(.2,0,.2,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.results-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
.results-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:#fff;}
.results-date{font-size:.74rem;color:var(--text3);}
.result-type-badge{display:inline-flex;align-items:center;gap:6px;background:var(--glass2);border:1px solid var(--border);border-radius:50px;padding:4px 14px;font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--text2);margin-bottom:12px;letter-spacing:.06em;}

.results-grid{display:grid;gap:12px;}

/* \u2500\u2500 single result card \u2500\u2500 */
.rc{background:var(--bg1);border:1.5px solid var(--border);border-radius:var(--r2);padding:20px 22px;display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:16px;transition:all .25s;position:relative;overflow:hidden;animation:cardIn .4s cubic-bezier(.2,0,.2,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.rc:hover{transform:translateX(5px);border-color:rgba(255,255,255,.12);}
.rc.winner{border-color:var(--green);background:linear-gradient(135deg,rgba(34,211,122,.07),var(--bg1) 60%);}
.rc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:0 3px 3px 0;opacity:0;transition:opacity .3s;}
.rc.winner::before{background:var(--green);opacity:1;}
.rc-rank{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;flex-shrink:0;}
.r1{background:linear-gradient(135deg,var(--green),#16a860);color:#000;}
.r2{background:rgba(255,255,255,.08);color:var(--text2);}
.r3{background:rgba(255,255,255,.05);color:var(--text3);}
.r4{background:rgba(255,255,255,.03);color:var(--text3);}
.rc-op{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.op-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rc-tarifa{font-size:.73rem;color:var(--text2);}
.rc-detail{font-size:.71rem;color:var(--text3);margin-top:4px;}
.rc-bar{margin-top:8px;display:flex;align-items:center;gap:8px;}
.bar-t{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;}
.bar-f{height:100%;border-radius:10px;transition:width .9s cubic-bezier(.4,0,.2,1) .2s;}
.price-val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:#fff;line-height:1;text-align:right;}
.price-mes{font-size:.7rem;color:var(--text2);text-align:right;margin-top:3px;}
.price-save{font-size:.73rem;font-weight:600;text-align:right;margin-top:4px;color:var(--green);}
.price-more{font-size:.73rem;font-weight:600;text-align:right;margin-top:4px;color:var(--text3);}
.winner-badge{position:absolute;top:12px;right:12px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:.58rem;font-weight:800;padding:3px 10px;border-radius:50px;letter-spacing:.1em;text-transform:uppercase;}

/* \u2500\u2500 combo sub-breakdown inside result card \u2500\u2500 */
.rc-combo-sub{
  grid-column:1/-1;
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);
}
.rcs-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 10px;background:var(--bg2);border-radius:8px;}
.rcs-label{font-size:.7rem;color:var(--text2);}
.rcs-val{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;color:#fff;}
@media(max-width:520px){.rc-combo-sub{grid-template-columns:1fr;}}

/* resume strip */
.resume-strip{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:18px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0;text-align:center;}
@media(max-width:560px){.resume-strip{grid-template-columns:1fr 1fr;}}
.rs-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent);}
.rs-val.gas{color:var(--og);}
.rs-val.combo{color:var(--combo);}
.rs-label{font-size:.7rem;color:var(--text2);margin-top:4px;}

/* combo big savings banner */
.savings-banner{
  background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(244,114,182,.07));
  border:1px solid rgba(167,139,250,.25);
  border-radius:var(--r2);padding:20px 24px;
  display:flex;align-items:center;gap:18px;
  margin-bottom:14px;
}
.sb-icon{font-size:2rem;flex-shrink:0;}
.sb-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--combo);margin-bottom:4px;}
.sb-desc{font-size:.8rem;color:var(--text2);line-height:1.5;}
.sb-amount{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#fff;text-align:right;flex-shrink:0;}
.sb-sub{font-size:.7rem;color:var(--text2);text-align:right;margin-top:2px;}
@media(max-width:480px){.savings-banner{flex-wrap:wrap;}.sb-amount{text-align:left;}}

/* CTA */
.cta-box{background:linear-gradient(135deg,rgba(255,107,43,.1),rgba(79,142,247,.06));border:1px solid rgba(255,107,43,.25);border-radius:var(--r3);padding:32px 28px;text-align:center;margin-top:18px;position:relative;overflow:hidden;}
.cta-box.gas-cta{background:linear-gradient(135deg,rgba(255,140,66,.1),rgba(79,195,247,.06));border-color:rgba(255,140,66,.25);}
.cta-box.combo-cta{background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(244,114,182,.07));border-color:rgba(167,139,250,.25);}
.cta-box::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,107,43,.07),transparent 55%);}
.cta-box.gas-cta::before{background:radial-gradient(circle at 50% 0%,rgba(255,140,66,.08),transparent 55%);}
.cta-box.combo-cta::before{background:radial-gradient(circle at 50% 0%,rgba(167,139,250,.09),transparent 55%);}
.cta-inner{position:relative;z-index:1;}
.cta-icon{font-size:2rem;margin-bottom:12px;display:block;}
.cta-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:9px;}
.cta-desc{font-size:.86rem;color:var(--text2);line-height:1.65;max-width:440px;margin:0 auto 22px;}
.cta-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-cta-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;padding:13px 26px;border-radius:50px;text-decoration:none;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(255,107,43,.3);display:inline-flex;align-items:center;gap:8px;}
.btn-cta-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,107,43,.45);}
.btn-cta-primary.gas-btn-cta{background:linear-gradient(135deg,var(--og),var(--bg-gas));box-shadow:0 4px 20px rgba(255,140,66,.25);}
.btn-cta-primary.combo-btn-cta{background:linear-gradient(135deg,var(--combo),var(--combo2));box-shadow:0 4px 20px rgba(167,139,250,.28);}
.btn-cta-wa{background:rgba(37,211,102,.15);color:#25d366;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;padding:13px 26px;border-radius:50px;text-decoration:none;border:1px solid rgba(37,211,102,.35);transition:all .2s;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.btn-cta-wa:hover{background:rgba(37,211,102,.25);transform:translateY(-2px);}
.wa-icon{width:18px;height:18px;fill:#25d366;flex-shrink:0;}

.disclaimer{margin-top:20px;padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);text-align:center;}
.disclaimer p{font-size:.7rem;color:var(--text3);line-height:1.6;}
.disclaimer a{color:var(--text2);text-decoration:underline;}

/* floating WA */
.wa-float{position:fixed;bottom:28px;right:24px;z-index:999;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#25d366,#128c7e);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(37,211,102,.45);text-decoration:none;animation:waFloat 3s ease-in-out infinite;transition:transform .2s;}
.wa-float:hover{transform:scale(1.1);}
.wa-float svg{width:28px;height:28px;fill:#fff;}
@keyframes waFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

footer{text-align:center;padding:36px 0 16px;border-top:1px solid var(--border);margin-top:56px;}
footer p{font-size:.73rem;color:var(--text3);}
footer a{color:var(--text2);text-decoration:none;}
footer a:hover{color:var(--accent);}
.footer-logo{font-family:'Syne',sans-serif;font-size:.83rem;font-weight:800;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
